<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient — flame -> ember -> neon, brand palette -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ff3d6e"/>
      <stop offset="55%"  stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#b46bff"/>
    </linearGradient>

    <!-- Subtle inner highlight at top-left for a soft "glass" feel -->
    <radialGradient id="sheen" cx="25%" cy="15%" r="70%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Text fill: bright white with the faintest warm tint -->
    <linearGradient id="text-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff6e6"/>
    </linearGradient>

    <!-- Drop shadow for the wordmark -->
    <filter id="wordmark-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1a0516" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- Rounded-square app-icon shape (iOS-safe radius) -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#sheen)"/>

  <!-- Scattered confetti dots — static, just for personality -->
  <g opacity="0.55">
    <circle cx="140" cy="190" r="10" fill="#ffffff"/>
    <circle cx="880" cy="150" r="14" fill="#ffffff"/>
    <circle cx="930" cy="860" r="9"  fill="#ffffff"/>
    <circle cx="120" cy="880" r="13" fill="#ffffff"/>
    <circle cx="820" cy="520" r="7"  fill="#ffffff" opacity="0.8"/>
    <circle cx="210" cy="520" r="6"  fill="#ffffff" opacity="0.8"/>
    <!-- Tiny sparkle x-shapes -->
    <g fill="#fff">
      <path d="M 780 270 l 12 0 l 0 -12 l 8 0 l 0 12 l 12 0 l 0 8 l -12 0 l 0 12 l -8 0 l 0 -12 l -12 0 z"/>
      <path d="M 160 680 l 10 0 l 0 -10 l 6 0 l 0 10 l 10 0 l 0 6 l -10 0 l 0 10 l -6 0 l 0 -10 l -10 0 z"/>
    </g>
  </g>

  <!-- Wordmark: PARTY stacked over MATE, bold, centered -->
  <g
    font-family="Unbounded, 'Segoe UI', Impact, 'Arial Black', sans-serif"
    font-weight="900"
    fill="url(#text-fill)"
    text-anchor="middle"
    filter="url(#wordmark-shadow)"
  >
    <text x="512" y="468" font-size="210" letter-spacing="6">PARTY</text>
    <text x="512" y="720" font-size="210" letter-spacing="16">MATE</text>
  </g>

  <!-- Small 23+ adult-content ribbon tucked under the wordmark -->
  <g text-anchor="middle" font-family="Unbounded, 'Segoe UI', sans-serif" font-weight="800">
    <rect x="416" y="800" width="192" height="56" rx="28" fill="#1a0516" opacity="0.35"/>
    <text x="512" y="838" fill="#ffffff" font-size="30" letter-spacing="10" opacity="0.9">23+ READY</text>
  </g>
</svg>

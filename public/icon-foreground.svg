<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Transparent-background version of the wordmark — used for Android
       adaptive-icon foreground layer. The launcher applies its own shape
       mask (circle / rounded square / squircle) on top. -->
  <defs>
    <linearGradient id="text-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff6e6"/>
    </linearGradient>
    <filter id="wordmark-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1a0516" flood-opacity="0.45"/>
    </filter>
  </defs>

  <g
    font-family="Unbounded, 'Segoe UI', Impact, 'Arial Black', sans-serif"
    font-weight="900"
    fill="url(#text-fill)"
    text-anchor="middle"
    filter="url(#wordmark-shadow)"
  >
    <text x="512" y="468" font-size="210" letter-spacing="6">PARTY</text>
    <text x="512" y="720" font-size="210" letter-spacing="16">MATE</text>
  </g>
</svg>

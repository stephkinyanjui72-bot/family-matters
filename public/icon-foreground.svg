<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Foreground layer for Android adaptive icon.
       Transparent background; the OS draws a shape mask around this. -->
  <text x="20%" y="35%" text-anchor="middle" font-size="110" transform="rotate(-15 102 180)">✨</text>
  <text x="80%" y="32%" text-anchor="middle" font-size="100" transform="rotate(20 410 160)">💋</text>
  <text x="50%" y="68%" text-anchor="middle" font-family="system-ui, 'Segoe UI Emoji', sans-serif" font-size="280">🎉</text>
  <text x="18%" y="85%" text-anchor="middle" font-size="90" transform="rotate(-10 92 435)">🔥</text>
  <text x="85%" y="88%" text-anchor="middle" font-size="80" transform="rotate(15 435 450)">🍾</text>
</svg>
